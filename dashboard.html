<!DOCTYPE html>
<html lang="en">
<head>

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }
    }
    @layer base {
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
        }
    }
    @layer components {
        .btn-primary {
            @apply px-4 py-2 bg-[var(--primary-color)] text-white font-medium rounded-md shadow-sm hover:bg-[var(--primary-hover)] transition-colors inline-flex items-center justify-center gap-2;
        }
        .btn-outline {
            @apply px-4 py-2 bg-white text-gray-700 font-medium rounded-md shadow-sm border border-gray-300 hover:bg-gray-50 transition-colors inline-flex items-center justify-center gap-2;
        }
    }
    </style>
</head>
